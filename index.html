<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alloso · 나에게 맞는 소파 찾기</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F8F8F7; --surface:#FFFFFF; --card:#F5F5F3; --card2:#EEEDE9;
  --border:#E0DFD9; --border2:#C4C2BC;
  --accent:#1A1A18; --accent2:#3A3A38;
  --gold:#8B7355; --gold-lt:#A89070;
  --gold-bg:rgba(139,115,85,.07); --gold-bg2:rgba(139,115,85,.15);
  --text:#6A6A66; --text2:#2E2E2A; --muted:#9A9A96;
  --t-bg:#EEF2F6; --t-border:#B8CCE0; --t-color:#1A2E42; --t-accent:#2A4870;
  --f-bg:#F5EDE4; --f-border:#DCC4A8; --f-color:#3A2818; --f-accent:#8A6440;
  --r:2px; --sh:0 1px 4px rgba(26,26,24,.06); --sh2:0 8px 32px rgba(26,26,24,.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  background:var(--bg);font-family:'Noto Sans KR',sans-serif;
  font-weight:300;font-size:13px;
  display:flex;align-items:center;justify-content:center;min-height:100vh;
}

/* ══ SHELL ══ */
.shell{
  width:400px;height:840px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;
  box-shadow:var(--sh2);display:flex;flex-direction:column;
  position:relative;
}

/* ══ HEADER ══ */
.hdr{
  flex-shrink:0;border-bottom:1px solid var(--border);
  padding:12px 18px 10px;
  display:flex;align-items:center;justify-content:space-between;
  transition:background .4s;
}
.hdr.t{background:#F0F3FA;}
.hdr.f{background:#FAF0F2;}
.hdr-left{display:flex;align-items:center;gap:10px;}
.hdr-av{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:16px;border:1px solid var(--border);
  transition:background .4s;
  background:var(--accent);
}
.hdr-av.t{background:#D8E0F0;border-color:var(--t-border);}
.hdr-av.f{background:#F0D8DC;border-color:var(--f-border);}
.hdr-brand{font-family:'Josefin Sans',sans-serif;font-size:14px;font-weight:400;letter-spacing:.38em;color:var(--accent);line-height:1;text-transform:uppercase;}
.hdr-consultant{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.06em;}
.hdr-r{display:flex;gap:5px;}
.hbtn{
  width:27px;height:27px;border-radius:50%;background:var(--card2);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:11px;color:var(--muted);transition:all .15s;
}
.hbtn:hover{border-color:var(--border2);color:var(--accent);}

/* ══ PROGRESS RIBBON ══ */
.ribbon{
  flex-shrink:0;padding:8px 18px 7px;border-bottom:1px solid var(--border);
  transition:background .4s;
}
.ribbon.t{background:#F4F6FC;}
.ribbon.f{background:#FAF4F5;}
.prog-track{display:flex;align-items:center;gap:3px;margin-bottom:4px;}
.prog-seg{flex:1;height:2px;background:var(--border);border-radius:2px;overflow:hidden;transition:background .3s;}
.prog-seg.done .ps-fill,.prog-seg.active .ps-fill{width:100%;}
.ps-fill{width:0%;height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.prog-seg.t .ps-fill{background:var(--t-accent);}
.prog-seg.f .ps-fill{background:var(--f-accent);}
.prog-seg.done.t .ps-fill,.prog-seg.active.t .ps-fill{background:var(--t-accent);}
.prog-seg.done.f .ps-fill,.prog-seg.active.f .ps-fill{background:var(--f-accent);}
.prog-lbls{display:flex;justify-content:space-between;}
.prog-lbl{font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);transition:.3s;}
.prog-lbl.active.t{color:var(--t-accent);}
.prog-lbl.active.f{color:var(--f-accent);}

/* ══ MAIN ══ */
.main{flex:1;overflow:hidden;position:relative;}

/* ══ SLIDES ══ */
.slide{
  position:absolute;inset:0;overflow-y:auto;
  background:var(--bg);
  transform:translateX(100%);transition:transform .36s cubic-bezier(.4,0,.2,1);
}
.slide.active{transform:translateX(0);position:relative;height:100%;}
.slide.out-left{transform:translateX(-100%);}
.slide::-webkit-scrollbar{width:3px;}
.slide::-webkit-scrollbar-thumb{background:var(--border2);}
.sinner{padding:22px 18px 28px;display:flex;flex-direction:column;gap:15px;min-height:100%;}

/* step header */
.ehead{display:flex;flex-direction:column;gap:5px;}
.eyebrow{font-size:9px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:3px;}
.eyebrow.t{color:var(--t-accent);}
.eyebrow.f{color:var(--f-accent);}
.eq{font-family:'Josefin Sans',sans-serif;font-size:23px;font-weight:300;color:var(--accent);line-height:1.35;}
.eq em{font-style:italic;}
.eq.t em{color:var(--t-accent);}
.eq.f em{color:var(--f-accent);}
.edesc{font-size:12px;color:var(--muted);line-height:1.65;}

/* ══ OPTION CARDS ══ */
.opts{display:flex;flex-direction:column;gap:7px;}
.opt{
  background:var(--surface);border:1.5px solid var(--border);border-radius:8px;
  padding:13px 15px;cursor:pointer;display:flex;align-items:center;gap:12px;
  transition:all .18s;box-shadow:var(--sh);
}
.opt:hover{border-color:var(--border2);}
.opt.sel.t{border-color:var(--t-accent);background:#EEF2F8;}
.opt.sel.f{border-color:var(--f-accent);background:#F8EEF0;}
.opt-icon{font-size:22px;flex-shrink:0;}
.opt-body{flex:1;}
.opt-main{font-size:13px;color:var(--text2);font-weight:400;line-height:1.1;}
.opt-sub{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4;}
.opt.sel .opt-main{color:var(--accent);}
.opt-check{
  width:19px;height:19px;border-radius:50%;border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:transparent;flex-shrink:0;transition:all .18s;
}
.opt.sel.t .opt-check{background:var(--t-accent);border-color:var(--t-accent);color:#fff;}
.opt.sel.f .opt-check{background:var(--f-accent);border-color:var(--f-accent);color:#fff;}

/* 2-column grid opts */
.opts2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.opts2 .opt{flex-direction:column;align-items:flex-start;padding:14px 14px 13px;gap:6px;}
.opts2 .opt-icon{font-size:28px;}
.opts2 .opt-check{margin-left:auto;margin-top:-24px;}
.opts2 .opt-sub{margin-top:2px;}

/* scene cards (F형 특화) */
.scene-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.scard{
  background:var(--surface);border:1.5px solid var(--border);border-radius:8px;
  overflow:hidden;cursor:pointer;transition:all .18s;box-shadow:var(--sh);
}
.scard:hover{transform:translateY(-1px);box-shadow:var(--sh2);}
.scard.sel{border-color:var(--f-accent);box-shadow:0 0 0 3px rgba(160,80,96,.1);}
.scard-visual{
  height:80px;display:flex;align-items:center;justify-content:center;
  font-size:34px;position:relative;
}
.scard-check{
  position:absolute;top:7px;right:7px;
  width:20px;height:20px;border-radius:50%;
  background:var(--f-accent);color:#fff;font-size:11px;
  display:none;align-items:center;justify-content:center;
}
.scard.sel .scard-check{display:flex;}
.scard-body{padding:9px 11px;}
.scard-main{font-size:12px;font-weight:400;color:var(--text2);line-height:1.2;margin-bottom:2px;}
.scard-sub{font-size:10px;color:var(--muted);line-height:1.35;}

/* T형 spec grid */
.spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.spec-item{
  background:var(--surface);border:1.5px solid var(--border);border-radius:8px;
  padding:12px 13px;cursor:pointer;transition:all .18s;box-shadow:var(--sh);
}
.spec-item:hover{border-color:var(--t-border);}
.spec-item.sel{border-color:var(--t-accent);background:var(--t-bg);}
.spec-num{font-family:'Josefin Sans',sans-serif;font-size:22px;font-weight:300;color:var(--t-accent);line-height:1;margin-bottom:3px;}
.spec-lbl{font-size:11px;color:var(--text2);font-weight:400;}
.spec-sub{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.4;}
.spec-item.sel .spec-lbl{color:var(--t-color);}

/* size input */
.sz-block{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;box-shadow:var(--sh);}
.sz-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
.sz-inp{
  flex:1;background:var(--card2);border:1.5px solid var(--border);border-radius:var(--r);
  padding:10px 13px;font-size:15px;font-family:'Noto Sans KR',sans-serif;
  color:var(--accent);outline:none;transition:all .2s;font-weight:300;
}
.sz-inp:focus{border-color:var(--gold);background:var(--surface);}
.sz-inp.t:focus{border-color:var(--t-accent);}
.sz-inp.f:focus{border-color:var(--f-accent);}
.sz-inp::placeholder{color:var(--muted);}
.sz-unit{font-size:13px;color:var(--muted);}
.presets{display:flex;gap:5px;flex-wrap:wrap;}
.pre{
  background:var(--card2);border:1px solid var(--border);border-radius:20px;
  padding:5px 12px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s;
}
.pre.t:hover,.pre.t.on{background:#EEF2F8;border-color:var(--t-accent);color:var(--t-accent);}
.pre.f:hover,.pre.f.on{background:#F8EEF0;border-color:var(--f-accent);color:var(--f-accent);}
.sz-fb{
  background:var(--gold-bg);border:1px solid rgba(154,120,64,.15);border-radius:var(--r);
  padding:9px 12px;font-size:11.5px;color:var(--text2);line-height:1.6;
  display:none;margin-top:10px;
}
.sz-fb.t{background:rgba(58,90,160,.05);border-color:rgba(58,90,160,.15);}
.sz-fb.f{background:rgba(160,80,96,.05);border-color:rgba(160,80,96,.15);}
.sz-fb.show{display:block;animation:up .2s ease both;}

/* product cards */
.pcards{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;}
.pcards::-webkit-scrollbar{height:3px;}
.pcards::-webkit-scrollbar-thumb{background:var(--border2);}
.pcard{
  flex-shrink:0;width:170px;background:var(--surface);
  border:1.5px solid var(--border);border-radius:8px;
  overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:var(--sh);
}
.pcard:hover{transform:translateY(-2px);box-shadow:var(--sh2);}
.pcard.sel{box-shadow:0 0 0 3px rgba(154,120,64,.15);}
.pcard.sel.t{border-color:var(--t-accent);box-shadow:0 0 0 3px rgba(58,90,160,.1);}
.pcard.sel.f{border-color:var(--f-accent);box-shadow:0 0 0 3px rgba(160,80,96,.1);}
.pcard-img{
  height:96px;background:linear-gradient(135deg,var(--card2),var(--bg));
  display:flex;align-items:center;justify-content:center;
  border-bottom:1px solid var(--border);position:relative;
}
.pcard-img-lbl{font-family:'Josefin Sans',sans-serif;font-size:15px;font-style:italic;color:var(--border2);}
.pcard-badge{
  position:absolute;top:7px;left:7px;font-size:7.5px;letter-spacing:.16em;
  text-transform:uppercase;padding:2px 7px;border-radius:1px;
}
.pcard-badge.t{background:var(--t-color);color:rgba(180,200,240,.9);}
.pcard-badge.f{background:var(--f-color);color:rgba(240,200,210,.9);}
.pcard-sel{
  position:absolute;top:7px;right:7px;width:21px;height:21px;border-radius:50%;
  display:none;align-items:center;justify-content:center;font-size:11px;color:#fff;
}
.pcard.sel .pcard-sel{display:flex;}
.pcard.sel.t .pcard-sel{background:var(--t-accent);}
.pcard.sel.f .pcard-sel{background:var(--f-accent);}
.pcard-body{padding:10px 12px;}
.pcard-series{font-size:9px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:2px;}
.pcard-series.t{color:var(--t-accent);}
.pcard-series.f{color:var(--f-accent);}
.pcard-name{font-family:'Josefin Sans',sans-serif;font-size:14.5px;font-weight:400;color:var(--accent);margin-bottom:2px;}
.pcard-spec{font-size:10px;color:var(--muted);margin-bottom:5px;}
.match-row{display:flex;align-items:center;gap:5px;margin-bottom:5px;}
.match-track{flex:1;height:2px;background:var(--card2);border-radius:1px;overflow:hidden;}
.match-fill-t{height:100%;background:linear-gradient(90deg,var(--t-accent),#6080C0);transition:width .5s .1s;}
.match-fill-f{height:100%;background:linear-gradient(90deg,var(--f-accent),#C07080);transition:width .5s .1s;}
.match-txt{font-size:9px;font-weight:500;}
.match-txt.t{color:var(--t-accent);}
.match-txt.f{color:var(--f-accent);}
.pcard-price{font-size:11px;color:var(--text);}
.pcard-price strong{font-weight:500;}
.pcard-price strong.t{color:var(--t-accent);}
.pcard-price strong.f{color:var(--f-accent);}
.pcard-desc{font-size:10px;color:var(--muted);line-height:1.5;margin-top:4px;}

/* grade tabs */
.gtabs{display:flex;gap:5px;flex-wrap:wrap;}
.gtab{
  background:var(--card2);border:1px solid var(--border);border-radius:20px;
  padding:5px 12px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s;
}
.gtab.t.on{background:#EEF2F8;border-color:var(--t-accent);color:var(--t-accent);}
.gtab.f.on{background:#F8EEF0;border-color:var(--f-accent);color:var(--f-accent);}

/* swatches */
.swatch-row{display:flex;gap:7px;flex-wrap:wrap;}
.sw{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.sw-c{
  width:38px;height:38px;border-radius:50%;border:2px solid var(--border);
  transition:all .2s;position:relative;
}
.sw-c::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;opacity:0;transition:.18s;text-shadow:0 1px 2px rgba(0,0,0,.3);}
.sw.on .sw-c::after{opacity:1;}
.sw.on.t .sw-c{border-color:var(--t-accent);box-shadow:0 0 0 3px rgba(58,90,160,.12);}
.sw.on.f .sw-c{border-color:var(--f-accent);box-shadow:0 0 0 3px rgba(160,80,96,.12);}
.sw-n{font-size:9px;color:var(--muted);text-align:center;max-width:42px;line-height:1.3;}
.sw.on.t .sw-n{color:var(--t-accent);}
.sw.on.f .sw-n{color:var(--f-accent);}

.art-detail{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px;
  box-shadow:var(--sh);display:none;
}
.art-detail.show{display:block;animation:up .2s ease both;}

/* receipt strip */
.receipt{
  border-radius:var(--r);padding:10px 13px;
  display:flex;flex-direction:column;gap:5px;
}
.receipt.t{background:#EEF2F8;border:1px solid var(--t-border);}
.receipt.f{background:#F8EEF0;border:1px solid var(--f-border);}
.rr{display:flex;justify-content:space-between;font-size:11px;}
.rk{color:var(--muted);}
.rv.t{color:var(--t-color);}
.rv.f{color:var(--f-color);}

/* summary card */
.sumcard{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:var(--sh);}
.sumtop{padding:13px 15px;display:flex;align-items:center;justify-content:space-between;}
.sumtop.t{background:var(--t-color);}
.sumtop.f{background:var(--f-color);}
.sumtop-title{font-family:'Josefin Sans',sans-serif;font-size:15px;font-weight:300;color:rgba(220,230,255,.85);letter-spacing:.14em;}
.sumtop.f .sumtop-title{color:rgba(255,225,230,.85);}
.sum-row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 14px;border-bottom:1px solid var(--border);font-size:12px;}
.sum-row:last-child{border-bottom:none;}
.sk{color:var(--muted);}
.sv{color:var(--accent);font-weight:400;}

/* booking */
.room-opt{
  background:var(--surface);border:1.5px solid var(--border);border-radius:8px;
  padding:13px 15px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;
  transition:all .18s;box-shadow:var(--sh);
}
.room-opt.sel.t{border-color:var(--t-accent);background:var(--t-bg);}
.room-opt.sel.f{border-color:var(--f-accent);background:var(--f-bg);}
.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.tslot{
  background:var(--card2);border:1px solid var(--border);border-radius:var(--r);
  padding:7px 0;text-align:center;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s;
}
.tslot.on.t{background:var(--t-bg);border-color:var(--t-accent);color:var(--t-accent);}
.tslot.on.f{background:var(--f-bg);border-color:var(--f-accent);color:var(--f-accent);}

/* ══ NAV BAR ══ */
.navbar{
  flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);
  padding:11px 17px;display:flex;align-items:center;gap:8px;
}
.nav-back{
  width:40px;height:40px;border-radius:50%;background:var(--card2);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;color:var(--muted);transition:all .15s;flex-shrink:0;
}
.nav-back:hover{border-color:var(--border2);color:var(--accent);}
.nav-next{
  flex:1;height:40px;border:none;border-radius:8px;
  color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:12px;
  letter-spacing:.14em;text-transform:uppercase;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;
}
.nav-next.t{background:var(--t-accent);}
.nav-next.t:hover{background:var(--t-color);}
.nav-next.f{background:var(--f-accent);}
.nav-next.f:hover{background:var(--f-color);}
.nav-next:disabled{opacity:.38;cursor:not-allowed;}
.nav-arr{font-size:14px;transition:transform .2s;}
.nav-next:not(:disabled):hover .nav-arr{transform:translateX(3px);}

/* ══ WELCOME ══ */
.welcome{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:30px 22px 24px;background:var(--surface);overflow-y:auto;
}
.welcome::-webkit-scrollbar{width:0;}
.wlogo{font-family:'Josefin Sans',sans-serif;font-size:26px;font-weight:400;letter-spacing:.42em;color:var(--accent);text-transform:uppercase;line-height:1;margin-bottom:4px;}
.wsub{font-size:9px;letter-spacing:.30em;text-transform:uppercase;color:var(--muted);margin-bottom:24px;}
.wtag{font-family:'Josefin Sans',sans-serif;font-size:14px;font-weight:300;font-style:normal;color:var(--text2);text-align:center;line-height:1.75;letter-spacing:.05em;margin-bottom:8px;}
.wdiv{width:36px;height:1px;background:var(--gold);margin:0 auto 20px;opacity:.5;}
.wask{font-size:14px;font-weight:400;color:var(--accent);text-align:center;margin-bottom:6px;letter-spacing:.02em;}
.wask-sub{font-size:11.5px;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:20px;}

/* consultant selector */
.consultant-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:20px;}
.cc{
  border:2px solid var(--border);border-radius:12px;
  padding:18px 14px 16px;cursor:pointer;transition:all .22s;
  display:flex;flex-direction:column;align-items:center;gap:0;
  position:relative;overflow:hidden;
}
.cc::before{
  content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;
}
.cc.t-card::before{background:linear-gradient(135deg,#EEF2F8,#F4F6FB);}
.cc.f-card::before{background:linear-gradient(135deg,#F5EDE0,#F9F1E6);}
.cc:hover::before{opacity:1;}
.cc.t-card:hover,.cc.t-card.sel{border-color:var(--t-accent);}
.cc.f-card:hover,.cc.f-card.sel{border-color:var(--f-accent);}
.cc.sel::before{opacity:1;}
/* material swatch bar replaces emoji */
.cc-swatch{
  width:100%;height:3px;border-radius:2px;margin-bottom:14px;position:relative;z-index:1;
}
.cc.t-card .cc-swatch{background:linear-gradient(90deg,#2A4870,#7AA0D4);}
.cc.f-card .cc-swatch{background:linear-gradient(90deg,#8A6440,#C4A882);}
.cc-type{
  font-size:9px;font-weight:400;letter-spacing:.28em;text-transform:uppercase;
  margin-bottom:6px;position:relative;z-index:1;color:var(--muted);
}
.cc-name{
  font-family:'Josefin Sans',sans-serif;font-size:22px;font-weight:400;letter-spacing:.22em;
  text-transform:uppercase;color:var(--accent);margin-bottom:10px;position:relative;z-index:1;
}
.cc-tags{display:flex;flex-direction:column;gap:3px;width:100%;position:relative;z-index:1;}
.cc-tag{
  font-size:10px;color:var(--muted);line-height:1.4;
  display:flex;align-items:flex-start;gap:4px;
}
.cc-tag::before{content:'—';flex-shrink:0;color:var(--border2);}
.cc-sel-badge{
  position:absolute;top:9px;right:9px;width:18px;height:18px;border-radius:50%;
  display:none;align-items:center;justify-content:center;font-size:9px;color:#fff;
}
.cc.t-card .cc-sel-badge{background:var(--t-accent);}
.cc.f-card .cc-sel-badge{background:var(--f-accent);}
.cc.sel .cc-sel-badge{display:flex;}

.w-btn-pri{
  width:100%;max-width:340px;padding:14px;border:none;border-radius:8px;
  color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:12px;
  letter-spacing:.18em;text-transform:uppercase;cursor:pointer;transition:all .2s;
}
.w-btn-pri.t{background:var(--t-accent);}
.w-btn-pri.t:hover{background:var(--t-color);}
.w-btn-pri.f{background:var(--f-accent);}
.w-btn-pri.f:hover{background:var(--f-color);}
.w-btn-pri:disabled{opacity:.3;cursor:not-allowed;background:var(--muted);}
.w-btn-sec{
  width:100%;max-width:340px;padding:11px;background:transparent;
  border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:11px;
  letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .18s;margin-top:7px;
}
.w-btn-sec:hover{border-color:var(--gold);color:var(--gold);}

/* complete */
.complete-icon{
  width:60px;height:60px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px;
}
.complete-icon.t{background:#EEF2F8;}
.complete-icon.f{background:#F5EDE4;}
.complete-title{font-family:'Josefin Sans',sans-serif;font-size:23px;font-weight:300;color:var(--accent);text-align:center;margin-bottom:5px;}
.complete-sub{font-size:12px;color:var(--muted);text-align:center;line-height:1.7;margin-bottom:20px;}

/* misc */
.slbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
.info-note{
  border-radius:var(--r);padding:9px 12px;font-size:11px;line-height:1.65;
}
.info-note.t{background:#EEF2F8;border:1px solid var(--t-border);color:var(--t-color);}
.info-note.f{background:#F8EEF0;border:1px solid var(--f-border);color:var(--f-color);}

@keyframes up{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-5px);}40%{transform:translateX(5px);}60%{transform:translateX(-3px);}80%{transform:translateX(3px);}}

/* ══ WELCOME UTIL BUTTONS ══ */
.w-util-btns{width:100%;max-width:340px;display:flex;flex-direction:column;gap:7px;margin-top:8px;}
.w-util-btn{
  width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;
  padding:11px 14px;display:flex;align-items:center;gap:11px;
  cursor:pointer;transition:all .18s;font-family:'Noto Sans KR',sans-serif;text-align:left;
}
.w-util-btn:hover{border-color:var(--gold);background:rgba(154,120,64,.06);}
.wub-icon{
  width:32px;height:32px;border-radius:8px;background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:14px;color:var(--gold);font-weight:500;font-style:normal;
}
.wub-body{flex:1;}
.wub-title{font-size:12.5px;font-weight:400;color:var(--text2);line-height:1;}
.wub-sub{font-size:10px;color:var(--muted);margin-top:3px;}
.wub-arrow{font-size:18px;color:var(--muted);}

/* ══ FULL OVERLAY PANEL ══ */
.overlay-panel{
  position:absolute;inset:0;z-index:50;
  background:var(--surface);
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .38s cubic-bezier(.4,0,.2,1);
}
.overlay-panel.open{transform:translateY(0);}
.op-hdr{
  flex-shrink:0;padding:14px 18px 12px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
  background:var(--surface);
}
.op-back{
  width:30px;height:30px;border-radius:50%;background:var(--card2);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;color:var(--muted);flex-shrink:0;transition:all .15s;
}
.op-back:hover{border-color:var(--border2);color:var(--accent);}
.op-title-wrap{}
.op-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:1px;}
.op-title{font-family:'Josefin Sans',sans-serif;font-size:19px;font-weight:400;color:var(--accent);letter-spacing:.06em;}
.op-body{flex:1;overflow-y:auto;background:var(--bg);}
.op-body::-webkit-scrollbar{width:3px;}
.op-body::-webkit-scrollbar-thumb{background:var(--border2);}
.op-inner{padding:20px 17px 32px;display:flex;flex-direction:column;gap:18px;}

/* ══ CARE STYLES ══ */
.care-hero{
  background:linear-gradient(135deg,var(--accent) 0%,#4A4440 100%);
  border-radius:10px;padding:20px;
}
.care-hero-tag{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(200,184,128,.6);margin-bottom:6px;}
.care-hero-title{font-family:'Josefin Sans',sans-serif;font-size:22px;font-weight:300;color:rgba(200,184,128,.95);line-height:1.3;margin-bottom:8px;}
.care-hero-desc{font-size:11px;color:rgba(255,255,255,.5);line-height:1.65;}

.care-tabs{display:flex;gap:5px;}
.ctab{
  flex:1;padding:9px 0;text-align:center;background:var(--card2);
  border:1px solid var(--border);border-radius:8px;
  font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s;
}
.ctab.on{background:var(--accent);border-color:var(--accent);color:#fff;}

.care-section{}
.care-section-title{
  font-family:'Josefin Sans',sans-serif;font-size:17px;font-weight:400;color:var(--accent);
  margin-bottom:11px;display:flex;align-items:center;gap:8px;
}
.care-section-title::before{content:'';display:block;width:3px;height:18px;background:var(--gold);border-radius:2px;flex-shrink:0;}

.care-item{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  overflow:hidden;margin-bottom:7px;box-shadow:var(--sh);
}
.care-item-hd{
  padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;
  transition:background .15s;
}
.care-item-hd:hover{background:var(--gold-bg);}
.ci-swatch{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;}
.ci-grade{
  font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  padding:2px 8px;border-radius:20px;margin-left:auto;
  font-weight:500;
}
.ci-grade.ess{background:#F0F5E8;color:#4A6A2A;border:1px solid #C8DCA8;}
.ci-grade.prem{background:#EEF2F8;color:var(--t-accent);border:1px solid var(--t-border);}
.ci-grade.design{background:#F8EEF8;color:#6A3A7A;border:1px solid #D8B8E0;}
.ci-grade.hi{background:#FFF4E0;color:#7A5020;border:1px solid #E8CCA0;}
.care-item-name{font-size:12.5px;color:var(--text2);font-weight:400;}
.care-item-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.care-item-body{
  border-top:1px solid var(--border);padding:12px 14px;background:var(--card2);
  display:none;
}
.care-item-body.open{display:block;animation:up .2s ease both;}
.care-step{display:flex;gap:10px;margin-bottom:9px;}
.care-step:last-child{margin-bottom:0;}
.cs-num{
  width:20px;height:20px;border-radius:50%;background:var(--gold-bg2);
  border:1px solid rgba(154,120,64,.2);display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--gold);font-weight:500;flex-shrink:0;margin-top:1px;
}
.cs-text{font-size:11.5px;color:var(--text2);line-height:1.6;}
.cs-text strong{color:var(--accent);font-weight:500;}
.care-warn{
  background:#FFF5E8;border:1px solid #E8D0A0;border-radius:6px;
  padding:8px 11px;font-size:11px;color:#6A4A20;line-height:1.55;margin-top:8px;
}

/* ══ FAQ STYLES ══ */
.faq-search{
  background:var(--card2);border:1.5px solid var(--border);border-radius:8px;
  padding:10px 14px;display:flex;align-items:center;gap:8px;
}
.faq-search input{
  flex:1;background:transparent;border:none;outline:none;font-family:'Noto Sans KR',sans-serif;
  font-size:12.5px;color:var(--text2);font-weight:300;
}
.faq-search input::placeholder{color:var(--muted);}
.faq-search-icon{color:var(--muted);font-size:14px;flex-shrink:0;}

.faq-cats{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;}
.faq-cats::-webkit-scrollbar{height:0;}
.fcat{
  background:var(--card2);border:1px solid var(--border);border-radius:20px;
  padding:6px 13px;font-size:11px;color:var(--muted);cursor:pointer;
  white-space:nowrap;transition:all .15s;flex-shrink:0;
}
.fcat.on{background:var(--accent);border-color:var(--accent);color:#fff;}

.faq-group{}
.faq-group-title{
  font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);
  margin-bottom:8px;padding-left:2px;
}
.faq-item{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  margin-bottom:6px;overflow:hidden;box-shadow:var(--sh);
}
.faq-q{
  padding:13px 14px;cursor:pointer;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
  transition:background .15s;
}
.faq-q:hover{background:var(--gold-bg);}
.fq-text{font-size:12.5px;color:var(--text2);line-height:1.4;font-weight:400;flex:1;}
.fq-icon{font-size:16px;color:var(--muted);transition:transform .25s;flex-shrink:0;margin-top:-1px;}
.faq-item.open .fq-icon{transform:rotate(45deg);color:var(--gold);}
.faq-item.open .faq-q{background:rgba(154,120,64,.04);}
.faq-a{
  border-top:1px solid var(--border);padding:12px 14px;background:var(--card2);
  font-size:12px;color:var(--text2);line-height:1.7;display:none;
}
.faq-a.open{display:block;animation:up .2s ease both;}
.faq-a strong{color:var(--accent);font-weight:500;}
.faq-a .fa-tag{
  display:inline-block;background:rgba(154,120,64,.1);border:1px solid rgba(154,120,64,.2);
  color:var(--gold);font-size:9.5px;padding:2px 8px;border-radius:20px;
  margin-bottom:7px;font-weight:500;letter-spacing:.08em;
}
.faq-hotline{
  background:var(--accent);border-radius:10px;padding:16px;
  display:flex;align-items:center;gap:13px;
}
.fhot-icon{font-size:26px;}
.fhot-body{}
.fhot-title{font-family:'Josefin Sans',sans-serif;font-size:16px;font-weight:300;color:rgba(200,184,128,.95);margin-bottom:3px;}
.fhot-info{font-size:11px;color:rgba(255,255,255,.5);line-height:1.6;}

/* ══ CHAT PANEL INTERNALS ══ */
.chat-status-dot{
  width:8px;height:8px;border-radius:50%;background:#C0C8C0;flex-shrink:0;
  transition:background .4s;
}
.chat-status-dot.live{background:#4AAA70;box-shadow:0 0 0 3px rgba(74,170,112,.15);}

.chat-api-bar{
  flex-shrink:0;background:#FFFDF5;border-bottom:1px solid #F0E8C8;padding:7px 16px;
}
.chat-api-inner{display:flex;align-items:center;gap:8px;}
.chat-api-input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:'Noto Sans KR',sans-serif;font-size:11px;color:var(--accent);
  font-weight:300;min-width:0;
}
.chat-api-input::placeholder{color:var(--muted);}
.chat-api-badge{
  font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;
  padding:2px 8px;border-radius:20px;flex-shrink:0;
  background:#F0E8C8;color:#8A7040;border:1px solid #E0D090;transition:all .3s;
}
.chat-api-badge.live{background:#DFF0E8;color:#2A6A40;border-color:#A8D8B8;}

/* messages area */
.chat-msgs{
  flex:1;overflow-y:auto;padding:14px 15px 6px;
  display:flex;flex-direction:column;gap:10px;
  background:var(--bg);
}
.chat-msgs::-webkit-scrollbar{width:3px;}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border2);}

/* bubbles */
.msg-row{display:flex;gap:8px;align-items:flex-end;}
.msg-row.user{flex-direction:row-reverse;}
.msg-av{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  background:var(--accent);display:flex;align-items:center;justify-content:center;
  font-size:12px;color:rgba(200,184,128,.9);font-family:'Josefin Sans',sans-serif;
}
.msg-bubble{
  max-width:78%;padding:10px 13px;border-radius:12px;
  font-size:12.5px;line-height:1.65;color:var(--text2);
  word-break:break-word;overflow-wrap:break-word;
  animation:up .22s ease both;
}
.msg-bubble.bot{
  background:var(--surface);border:1px solid var(--border);
  border-bottom-left-radius:3px;box-shadow:var(--sh);
}
.msg-bubble.user{
  background:var(--accent);color:rgba(255,255,255,.92);
  border-bottom-right-radius:3px;
}
.msg-bubble strong{color:var(--accent);font-weight:500;}
.msg-bubble.user strong{color:rgba(200,184,128,.95);}
.msg-bubble.bot strong{color:var(--accent);}
.msg-time{font-size:9px;color:var(--muted);margin-top:3px;padding:0 2px;}
.msg-row.user .msg-time{text-align:right;}

/* typing indicator */
.typing-dots{display:flex;gap:3px;padding:4px 2px;}
.typing-dots span{
  width:5px;height:5px;border-radius:50%;background:var(--muted);
  animation:tdot 1.2s infinite ease-in-out;
}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,80%,100%{transform:scale(.6);opacity:.4;}40%{transform:scale(1);opacity:1;}}

/* chat welcome */
.chat-welcome{
  display:flex;flex-direction:column;align-items:center;
  padding:20px 10px 10px;text-align:center;gap:6px;
}
.cw-av{
  width:46px;height:46px;border-radius:50%;background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-family:'Josefin Sans',sans-serif;font-size:18px;font-weight:400;
  color:rgba(200,184,128,.9);letter-spacing:.05em;margin-bottom:4px;
}
.cw-name{font-family:'Josefin Sans',sans-serif;font-size:17px;font-weight:400;color:var(--accent);}
.cw-desc{font-size:11.5px;color:var(--muted);line-height:1.6;max-width:240px;}

/* quick chips */
.chat-chips{
  flex-shrink:0;padding:6px 14px 0;
  display:flex;gap:5px;overflow-x:auto;
  background:var(--bg);
}
.chat-chips::-webkit-scrollbar{height:0;}
.chat-chip{
  flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:5px 12px;font-size:11px;color:var(--text2);cursor:pointer;
  white-space:nowrap;transition:all .15s;
}
.chat-chip:hover{border-color:var(--gold);color:var(--gold);}
.chat-chips.hidden{display:none;}

/* input */
.chat-input-wrap{
  flex-shrink:0;padding:8px 14px 12px;background:var(--surface);
  border-top:1px solid var(--border);
}
.chat-input-row{
  display:flex;gap:7px;align-items:flex-end;
  background:var(--card2);border:1.5px solid var(--border);border-radius:20px;
  padding:6px 7px 6px 14px;transition:border-color .2s;
}
.chat-input-row:focus-within{border-color:var(--gold);}
.chat-ta{
  flex:1;background:transparent;border:none;outline:none;resize:none;
  font-family:'Noto Sans KR',sans-serif;font-size:12.5px;font-weight:300;
  color:var(--accent);max-height:90px;line-height:1.5;
}
.chat-ta::placeholder{color:var(--muted);}
.chat-send{
  width:30px;height:30px;border-radius:50%;background:var(--accent);border:none;
  color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .18s;
}
.chat-send:hover{background:var(--accent2);}
.chat-send:disabled{opacity:.35;cursor:not-allowed;}

/* ══ FAB ══ */
/* ── Chat FAB ── */
.chat-fab{
  position:absolute;bottom:72px;right:14px;z-index:40;
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,#8B7355 0%,#C4A882 100%);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(139,115,85,.38),0 2px 6px rgba(0,0,0,.14);
  transition:all .22s;
}
.chat-fab:hover{transform:scale(1.07) translateY(-1px);box-shadow:0 8px 24px rgba(139,115,85,.44);}
.chat-fab-inner{
  display:flex;flex-direction:column;align-items:center;gap:1px;
}
.chat-fab-av{
  font-family:'Josefin Sans',sans-serif;font-size:16px;font-weight:300;
  letter-spacing:.1em;color:rgba(255,255,255,.95);line-height:1;
}
.chat-fab-dot{
  width:5px;height:5px;border-radius:50%;background:#A8E6A0;
  box-shadow:0 0 0 2px rgba(168,230,160,.3);
}
.chat-fab-badge{
  position:absolute;top:-2px;right:-2px;
  min-width:16px;height:16px;border-radius:8px;
  background:#C04040;color:#fff;font-size:9px;font-weight:500;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--surface);padding:0 3px;
}
/* Chat FAB label tooltip */
.chat-fab-label{
  position:absolute;right:56px;top:50%;transform:translateY(-50%);
  background:var(--accent);color:rgba(255,255,255,.9);
  font-family:'Josefin Sans',sans-serif;font-size:9px;letter-spacing:.14em;
  padding:5px 10px;border-radius:4px;white-space:nowrap;
  pointer-events:none;opacity:0;transition:opacity .18s;
}
.chat-fab-label::after{
  content:'';position:absolute;left:100%;top:50%;transform:translateY(-50%);
  border:4px solid transparent;border-left-color:var(--accent);
}
.chat-fab:hover .chat-fab-label{opacity:1;}
@keyframes fabIn{from{opacity:0;transform:scale(.5);}to{opacity:1;transform:scale(1);}}

/* ══ HOME SCREEN ══ */
.home{
  display:flex;flex-direction:column;align-items:center;
  padding:0;width:100%;height:100%;overflow-y:auto;
  background:var(--surface);
}
.home::-webkit-scrollbar{width:0;}
.home-hero{
  width:100%;background:var(--accent);
  padding:44px 28px 36px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  position:relative;overflow:hidden;
}
.home-hero::before{
  content:'';position:absolute;bottom:-40px;left:50%;transform:translateX(-50%);
  width:300px;height:80px;border-radius:50%;
  background:rgba(255,255,255,.04);
}
.home-hero-logo{
  /* logo img here */
  margin-bottom:6px;
  filter:invert(1) brightness(1.4) sepia(.2) saturate(.5);
}
.home-hero-sub{
  font-family:'Josefin Sans',sans-serif;font-size:8.5px;
  letter-spacing:.35em;text-transform:uppercase;
  color:rgba(200,184,128,.55);margin-bottom:4px;
}
.home-hero-tag{
  font-family:'Josefin Sans',sans-serif;font-size:12.5px;font-weight:300;
  letter-spacing:.12em;color:rgba(255,255,255,.55);text-align:center;line-height:1.6;
}

/* ── Product Preview Card ── */
.product-card{display:flex;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;margin:8px 0;cursor:pointer;transition:all .15s;text-decoration:none;color:inherit;}
.product-card:hover{border-color:var(--gold-lt);background:rgba(139,115,85,.06);}
.product-card-img{width:80px;height:80px;border-radius:6px;background:var(--bg2);flex-shrink:0;object-fit:cover;}
.product-card-body{flex:1;display:flex;flex-direction:column;justify-content:center;min-width:0;}
.product-card-name{font-family:'Josefin Sans',sans-serif;font-size:13px;font-weight:400;letter-spacing:.08em;color:var(--accent);text-transform:uppercase;}
.product-card-ko{font-size:10px;color:var(--muted);margin-top:1px;}
.product-card-desc{font-size:10px;color:var(--text2);margin-top:4px;line-height:1.5;}
.product-card-price{font-size:11px;color:var(--gold);margin-top:4px;font-weight:400;}
.product-card-link{font-size:9px;color:var(--muted);margin-top:3px;letter-spacing:.06em;}
@media(max-width:480px){
  .product-card{padding:12px;gap:12px}
  .product-card-img{width:68px;height:68px}
  .product-card-name{font-size:12px}
  .product-card-price{font-size:12px}
}
/* ── Mood Entry (Phase 1 — 시각적 진입) ── */
.mood-entry{padding:18px 16px 6px;}
.mood-brand{font-family:'Josefin Sans',sans-serif;font-size:10px;letter-spacing:.5em;color:var(--muted);text-align:center;text-transform:uppercase;margin-bottom:14px;}
.mood-prompt{font-size:14.5px;text-align:center;color:var(--accent);font-weight:300;line-height:1.55;margin-bottom:18px;letter-spacing:.02em;}
.mood-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.mood-card{cursor:pointer;transition:opacity .18s;}
.mood-card:hover{opacity:.86;}
.mood-card:active{opacity:.7;}
.mood-thumb{aspect-ratio:1;border-radius:4px;background-size:cover;background-position:center;background-color:var(--bg2);}
.mood-thumb.minimal{background-image:linear-gradient(145deg,#ECE7DC 0%,#D9D2C4 100%);}
.mood-thumb.natural{background-image:linear-gradient(145deg,#C9A87C 0%,#8B7355 100%);}
.mood-thumb.luxe_dark{background-image:linear-gradient(145deg,#4A3F36 0%,#211A16 100%);}
.mood-thumb.family{background-image:linear-gradient(145deg,#F4E8D8 0%,#E0CFB3 100%);}
.mood-thumb.scandi{background-image:linear-gradient(145deg,#E5DDD0 0%,#B5A892 100%);}
.mood-thumb.classic{background-image:linear-gradient(145deg,#8B6F47 0%,#4A3826 100%);}
.mood-label{font-size:10.5px;text-align:center;margin-top:6px;color:var(--accent);letter-spacing:.04em;}
.mood-hint{font-size:10.5px;text-align:center;color:var(--muted);margin-top:18px;padding-top:14px;border-top:1px solid var(--border);letter-spacing:.06em;}
/* ── Curated cards (무드 선택 후 추천) ── */
.curated-grid{display:flex;flex-direction:column;gap:8px;margin:8px 0;}
.curated-card{display:flex;gap:11px;background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:10px;align-items:center;}
.curated-img{width:74px;height:74px;border-radius:4px;background-size:cover;background-position:center;background-color:var(--bg2);flex-shrink:0;}
.curated-info{flex:1;min-width:0;}
.curated-en{font-family:'Josefin Sans',sans-serif;font-size:12px;letter-spacing:.14em;color:var(--accent);margin-bottom:1px;}
.curated-ko{font-size:10px;color:var(--muted);margin-bottom:4px;}
.curated-desc{font-size:10.5px;color:var(--text2);line-height:1.5;margin-bottom:5px;}
.curated-cta{font-size:10px;color:var(--gold);font-weight:400;letter-spacing:.04em;cursor:pointer;display:inline-block;padding:4px 8px;border:1px solid rgba(139,115,85,.3);border-radius:3px;background:rgba(139,115,85,.04);transition:all .15s;}
.curated-cta:hover{background:rgba(139,115,85,.12);}
/* ── Imagine Box (AI 이미지 생성) ── */
.imagine-box{margin:10px 0;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--card);}
.imagine-loading{padding:32px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;}
.imagine-spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:imagine-spin .8s linear infinite;}
@keyframes imagine-spin{to{transform:rotate(360deg);}}
.imagine-msg{font-size:11.5px;color:var(--muted);letter-spacing:.04em;line-height:1.55;}
.imagine-msg .sub{display:block;font-size:10px;color:var(--muted);margin-top:3px;opacity:.7;}
.imagine-result{display:block;width:100%;height:auto;background:var(--bg2);}
.imagine-meta{padding:9px 14px;background:rgba(0,0,0,.03);border-top:1px solid var(--border);font-family:'Josefin Sans',sans-serif;font-size:10px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;}
.imagine-meta .tag{color:var(--gold);}
.imagine-error{padding:18px 16px;font-size:11.5px;color:var(--muted);text-align:center;line-height:1.6;}
.imagine-error .retry{display:inline-block;margin-top:8px;color:var(--gold);cursor:pointer;text-decoration:underline;font-size:11px;}
/* ── Home One-Question Hero ── */
.home-oq{text-align:center;padding:48px 24px 20px;position:relative}
.home-oq-brand{font-family:'Josefin Sans',sans-serif;font-size:9px;letter-spacing:.45em;color:var(--muted);text-transform:uppercase;margin-bottom:16px}
.home-oq-q{font-family:'Josefin Sans',sans-serif;font-size:17px;font-weight:300;color:var(--accent);line-height:1.6;margin-bottom:20px;letter-spacing:.03em}
.home-oq-input{width:100%;background:var(--card);border:1.5px solid var(--border2);border-radius:24px;padding:13px 18px;font-size:13px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-weight:300;outline:none;transition:border-color .2s}
.home-oq-input:focus{border-color:var(--accent)}
.home-oq-input::placeholder{color:var(--muted)}
.home-oq-scenes{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:16px 0 8px}
.home-oq-scene{font-size:10px;padding:7px 14px;border-radius:18px;border:1px solid var(--border);color:var(--text2);background:transparent;cursor:pointer;transition:all .14s;font-family:'Noto Sans KR',sans-serif}
.home-oq-scene:hover{border-color:var(--gold-lt);color:var(--accent)}
.home-oq-divider{display:flex;align-items:center;gap:10px;margin:20px 0 12px;font-size:8.5px;color:var(--muted);letter-spacing:.12em}
.home-oq-divider::before,.home-oq-divider::after{content:'';flex:1;height:0.5px;background:var(--border)}
.home-oq-links{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.home-oq-link{font-size:10px;padding:6px 12px;color:var(--muted);cursor:pointer;transition:color .12s;background:none;border:none;font-family:'Noto Sans KR',sans-serif}
.home-oq-link:hover{color:var(--accent)}
.sb-eyebrow{
  font-size:8.5px;letter-spacing:.3em;text-transform:uppercase;
  color:rgba(200,184,128,.6);margin-bottom:6px;
}
.sb-title{
  font-family:'Josefin Sans',sans-serif;font-size:18px;font-weight:400;
  letter-spacing:.18em;color:rgba(255,255,255,.92);margin-bottom:6px;
  text-transform:uppercase;
}
.sb-title span{color:rgba(200,184,128,.85);}
.sb-desc{
  font-size:10.5px;color:rgba(255,255,255,.45);line-height:1.65;
}
.sb-arrow{
  position:absolute;right:18px;top:50%;transform:translateY(-50%);
  font-size:20px;color:rgba(200,184,128,.5);
}

/* ── Home menu list ── */
.home-menu{
  width:100%;padding:12px 16px 28px;
  display:flex;flex-direction:column;gap:1px;
}
.hm-divider{
  font-size:8.5px;letter-spacing:.28em;text-transform:uppercase;
  color:var(--muted);padding:14px 4px 8px;
}
.hm-btn{
  width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);
  padding:14px 4px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:background .15s;text-align:left;
}
.hm-btn:first-of-type{border-top:1px solid var(--border);}
.hm-btn:hover{background:var(--card);}
.hm-icon{
  width:34px;height:34px;border-radius:2px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;background:var(--card2);border:1px solid var(--border);
}
.hm-body{flex:1;}
.hm-title{font-size:12.5px;color:var(--text2);font-weight:400;margin-bottom:2px;}
.hm-sub{font-size:10px;color:var(--muted);}
.hm-arr{font-size:16px;color:var(--border2);}

/* ══ TYPE SELECT SCREEN ══ */
.type-sel{
  display:flex;flex-direction:column;align-items:center;
  padding:28px 16px 24px;width:100%;
  background:var(--surface);
  animation:up .3s ease both;
}
.ts-back{
  align-self:flex-start;background:none;border:none;cursor:pointer;
  font-size:11px;color:var(--muted);letter-spacing:.1em;
  display:flex;align-items:center;gap:5px;margin-bottom:20px;
  padding:0;
}
.ts-q{
  font-family:'Josefin Sans',sans-serif;font-size:16px;font-weight:300;
  color:var(--accent);letter-spacing:.06em;text-align:center;line-height:1.5;
  margin-bottom:6px;
}
.ts-sub{font-size:11px;color:var(--muted);text-align:center;margin-bottom:22px;}
.type-cards{width:100%;display:flex;flex-direction:column;gap:10px;margin-bottom:22px;}
.tc{
  width:100%;background:var(--surface);border:1.5px solid var(--border);
  border-radius:3px;padding:20px 18px 18px;cursor:pointer;
  transition:all .2s;text-align:left;position:relative;overflow:hidden;
}
.tc::before{
  content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s;
}
.tc.space::before{background:linear-gradient(135deg,rgba(42,72,112,.05) 0%,transparent 70%);}
.tc.life::before{background:linear-gradient(135deg,rgba(138,100,64,.06) 0%,transparent 70%);}
.tc:hover{border-color:var(--border2);}
.tc:hover::before{opacity:1;}
.tc.sel{border-color:var(--accent);}
.tc.sel.space{border-color:var(--t-accent);background:rgba(42,72,112,.03);}
.tc.sel.life{border-color:var(--f-accent);background:rgba(138,100,64,.03);}
.tc-bar{height:2px;width:40px;border-radius:2px;margin-bottom:14px;}
.tc.space .tc-bar{background:var(--t-accent);}
.tc.life  .tc-bar{background:var(--f-accent);}
.tc-label{
  font-family:'Josefin Sans',sans-serif;font-size:9px;
  letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;
}
.tc-name{
  font-family:'Josefin Sans',sans-serif;font-size:20px;font-weight:400;
  letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;
}
.tc-tags{display:flex;flex-direction:column;gap:4px;}
.tc-tag{font-size:10.5px;color:var(--text);line-height:1.45;display:flex;align-items:baseline;gap:7px;}
.tc-tag::before{content:'—';color:var(--border2);font-size:10px;flex-shrink:0;}
.tc-badge{
  position:absolute;top:14px;right:14px;
  width:18px;height:18px;border-radius:50%;display:none;
  align-items:center;justify-content:center;font-size:9px;color:#fff;
}
.tc.sel .tc-badge{display:flex;}
.tc.sel.space .tc-badge{background:var(--t-accent);}
.tc.sel.life  .tc-badge{background:var(--f-accent);}

/* ══════════════════════════════════════
   DESKTOP RESPONSIVE  ≥769px
   ══════════════════════════════════════ */
@media (min-width: 769px) {
  body {
    padding: 24px 16px;
    align-items: center;
  }
  .shell {
    width: min(820px, calc(100vw - 48px));
    height: min(900px, calc(100vh - 48px));
    border-radius: 16px;
  }
  /* Header — slightly more spacious */
  .hdr {
    padding: 14px 26px 12px;
  }
  /* Chat messages — content max 720px, centered with breathing space */
  .chat-msgs {
    padding-left: max(20px, calc((100% - 720px) / 2));
    padding-right: max(20px, calc((100% - 720px) / 2));
    padding-top: 22px;
  }
  /* Chat input — same content alignment as messages */
  .chat-input-wrap {
    padding-left: max(20px, calc((100% - 720px) / 2));
    padding-right: max(20px, calc((100% - 720px) / 2));
  }
  /* Welcome screen — more breathing on desktop */
  .home-oq {
    padding-top: 56px;
    padding-bottom: 40px;
  }
  .home-oq-q {
    font-size: 30px;
  }
  /* Overlay panel headers (Care/FAQ/Chat) — more horizontal padding */
  .op-hdr {
    padding-left: 26px;
    padding-right: 26px;
  }
  /* Overlay panel body — center content, allow wider */
  .op-body .op-inner {
    max-width: 720px;
    margin: 0 auto;
  }
  /* Bubbles can be a bit larger on desktop */
  .msg-bubble {
    max-width: 78%;
    font-size: 13.5px;
  }
}

/* Tablet adjustments — keep mobile shell but allow it to be slightly larger */
@media (min-width: 481px) and (max-width: 768px) {
  .shell {
    width: min(440px, calc(100vw - 24px));
    height: min(880px, calc(100vh - 24px));
  }
}

function homeAsk(text){
  if(!text||!text.trim())return;
  openChat();
  setTimeout(()=>sendMessage(text.trim()),300);
}

const RMAP = {
  sqm:      ()=>ans.sqm?{k:'거실',v:ans.sqm+'㎡'}:null,
  usage:    ()=>ans.usage?{k:'사용',v:{daily_long:'매일 장시간',daily_short:'하루 1-2시간',guest:'손님 접대',kids:'아이 놀이터'}[ans.usage]}:null,
  priority: ()=>ans.priority?{k:'우선순위',v:{durability:'내구성',value:'가성비',aesthetics:'심미성',premium:'프리미엄'}[ans.priority]}:null,
  scene:    ()=>ans.scene?{k:'장면',v:{morning:'아침 커피',movie:'가족 영화',nap:'낮잠',gather:'친구 모임'}[ans.scene]}:null,
  vibe:     ()=>ans.vibe?{k:'감성',v:{nordic:'북유럽',modern:'뉴욕 모던',jeju:'제주',hotel:'파리 호텔'}[ans.vibe]}:null,
  texture:  ()=>ans.texture?{k:'촉감',v:{soft:'보들보들',linen:'까슬까슬',leather:'매끈매끈',boucle:'폭신폭신'}[ans.texture]}:null,
  series:   ()=>ans.series?{k:'소파',v:ans.series}:null,
};
function receiptHtml(keys){
  const rows=keys.map(k=>RMAP[k]?.()).filter(Boolean);
  if(!rows.length) return '';
  return `<div class="receipt">${rows.map(r=>`<div class="rr"><span class="rk">${r.k}</span><span class="rv">${r.v}</span></div>`).join('')}</div>`;
}

let faqCat = 'all';
let faqSearch = '';

function buildFAQ(){
  const el = document.getElementById('faqInner');
  renderFAQContent(el);
}

function renderFAQContent(el){
  const cats = [{id:'all',label:'전체'},...FAQ_DATA.map(f=>({id:f.cat,label:f.catLabel}))];
  const filtered = faqCat==='all'
    ? FAQ_DATA
    : FAQ_DATA.filter(f=>f.cat===faqCat);
  const searched = faqSearch
    ? filtered.map(g=>({...g,items:g.items.filter(i=>i.q.includes(faqSearch)||i.a.replace(/<[^>]+>/g,'').includes(faqSearch))})).filter(g=>g.items.length)
    : filtered;

  el.innerHTML=`
    <div class="faq-search">
      <span class="faq-search-icon">🔍</span>
      <input type="text" placeholder="궁금한 것을 검색해보세요" value="${faqSearch}" oninput="onFaqSearch(this.value)" id="faqInput">
    </div>
    <div class="faq-cats">
      ${cats.map(c=>`<div class="fcat${faqCat===c.id?' on':''}" onclick="switchFaqCat('${c.id}')">${c.label}</div>`).join('')}
    </div>
    ${searched.map(group=>`
      <div class="faq-group">
        <div class="faq-group-title">${group.catLabel}</div>
        ${group.items.map((item,i)=>renderFaqItem(group.cat,i,item)).join('')}
      </div>`).join('')}
    <div class="faq-hotline">
      <div class="fhot-icon">📞</div>
      <div class="fhot-body">
        <div class="fhot-title">더 궁금한 게 있으신가요?</div>
        <div class="fhot-info">고객센터: 평일 9:30–17:30<br>alloso.co.kr · 카카오 알림톡</div>
      </div>
    </div>`;
}

function renderFaqItem(cat,i,item){
  const id=`faq_${cat}_${i}`;
  return `
    <div class="faq-item" id="${id}">
      <div class="faq-q" onclick="toggleFAQ('${id}')">
        <span class="fq-text">${item.q}</span>
        <span class="fq-icon">+</span>
      </div>
      <div class="faq-a" id="fa_${id}">${item.a}</div>
    </div>`;
}

function toggleFAQ(id){
  const item=document.getElementById(id);
  const body=document.getElementById('fa_'+id);
  const isOpen=item.classList.contains('open');
  // close all
  document.querySelectorAll('.faq-item.open').forEach(el=>{
    el.classList.remove('open');
    el.querySelector('.faq-a').className='faq-a';
  });
  if(!isOpen){
    item.classList.add('open');
    body.className='faq-a open';
  }
}
function switchFaqCat(cat){
  faqCat=cat;
  const el=document.getElementById('faqInner');
  renderFAQContent(el);
}
function onFaqSearch(v){
  faqSearch=v;
  faqCat='all';
  const el=document.getElementById('faqInner');
  renderFAQContent(el);
}

═══ 정책·서비스 FAQ (반드시 이 데이터 기반 답변) ═══

[상담/예약]
Q: 인테리어 상담은 어떻게 받을 수 있나요?
A: 두 가지 방법이 있어요. ① **온라인** — 이 챗봇에서 "사티 인테리어 보여줘"처럼 말씀하시면 실시간으로 거실 인테리어 이미지를 만들어 드려요. ② **오프라인** — 알로소 매장에서 전문 상담사의 공간 큐레이팅 상담을 받으실 수 있습니다. 네이버 플레이스에서 가까운 매장을 검색 후 예약하세요.

Q: 방문 상담 시 어떤 준비가 필요할까요?
A: ① **공간 사진** (가능하면 정면·측면 각도) ② 원하는 소파 사이즈 (대략적인 길이) ③ 선호하는 디자인/컬러. 챗봇에서 미리 인테리어 이미지를 만들어 보고 방문하시면 상담이 더 빠르고 정확해져요.

[제품정보]
Q: 컬러 및 소재 선택이 가능한가요?
A: 다양한 패브릭과 컬러 옵션을 제공하고 있습니다. 네이버 스마트스토어를 통해 실제 샘플을 자택으로 배송받아 확인하실 수 있습니다. (Alloso Take Out 서비스) https://brand.naver.com/alloso/lounge/article/5000478849

Q: 할인이나 프로모션이 있나요?
A: 시즌 및 기획전에 따라 매장별 프로모션이 상이하게 운영됩니다. 방문 시 적용 가능한 혜택을 안내드립니다.

[주문/계약]
Q: 결제 방식은 어떻게 되나요?
A: ① 카드 결제 ② 가상계좌 이체. 카드 무이자 할부는 최대 24개월까지 가능하며, 카드사별로 상이합니다.

Q: 주문 후 제작 기간은 얼마나 걸리나요?
A: 알로소 제품은 주문 후 고객님 사양에 맞춰 제작되는 주문제작 상품입니다. 배송 일정은 제품 및 옵션에 따라 다를 수 있으며, 계약 시 담당 상담사가 안내해 드립니다.

Q: 주문 취소는 언제까지 가능한가요?
A: ✅ 취소 가능 (계약금 전액 환불) - 배송 예정일 11일 전 (제작 착수 전), 배송 예정일 4일 전 (취소 사유 명시 시). ❌ 취소 불가 (잔금의 10% 위약금) - 배송 예정일 10일 후 (제작 완료 후)

Q: 카드, 할부 변경 가능할까요?
A: 1) 온라인몰 구매시 - 결제 변경이 필요하면 기존 주문건 취소 후 재구매 진행. 취소 후 재구매시 금액 및 배송 예정일이 변동될 수 있음. 2) 오프라인 구매시 - 구매하신 매장의 담당 매니저에게 연락.

[교환/환불]
Q: 제품에 품질 하자가 발생했어요. 어떻게 하나요?
A: 워런티 10 케어 서비스를 통해 도움받으실 수 있습니다. 담당 상담사에게 문의해 주세요. 단, 고객 부주의·잘못된 세탁·임의 수선·개조로 인한 손상은 서비스 적용이 어려울 수 있습니다.

Q: 제품 교환이나 환불이 가능한가요?
A: 알로소 제품은 고객님만을 위한 주문제작 상품으로, 배송 완료 후 교환 및 환불이 불가합니다. 구매 전 색상, 소재, 사양을 꼼꼼히 확인해 주세요.

[배송/설치]
Q: 배송 및 설치는 어떻게 진행되나요?
A: 알로소 전문 설치 팀이 제품과 함께 고객님 댁으로 직접 방문하여 배송 및 설치를 함께 진행해 드립니다. 설치 하루 전날 카카오톡 알림톡으로 방문 예정 일자·시간·설치 팀 정보가 발송됩니다.

Q: 배송비가 궁금해요.
A: 알로소는 전문 설치팀에서 별도 비용 없이 직접 시공해 드립니다. 단 일부 도서산간 지역(제주도 포함)의 경우 제품가 기준 4% 추가 비용이 발생합니다.

Q: 구매 후 배송 소요시간을 알고 싶어요
A: 주문제작상품(소파, 소파테이블 등)은 영업일 기준 최소 10-15일, 택배 재고상품(쿠션, 러그 등)은 7일 이내. 지역에 따라 일부 차등 있음.

Q: 기존 가구 수거도 가능한가요?
A: 기존 가구 수거가 가능합니다. 무상 서비스로 제공되며, 사전 문의를 통해 가능 여부를 확인해 주시기 바랍니다.

Q: 배송 사이즈 기준이 궁금해요
A: 1) 엘리베이터 내부 사이즈 W900 D1200 H2300mm 이상 2) 중문 포함 출입문 사이즈 W800mm (사티, 로바의 경우 850mm) 이상 3) 진입로 'ㄱ'자 꺾이는 구조 시 엘리베이터 사이즈와 동일 면적 확보 필요 4) 실내 천장 높이 2300mm 이상 (3인 단품 소파). 반입 어려우면 배송 2주 전까지 고객센터 ☎1577-1641로 연락.

Q: 사다리차 비용 발생하나요?
A: 배송지 환경에 따라 사다리차 이용시 비용이 발생할 수 있습니다. 고객센터 ☎1577-1641로 문의.

Q: 해외 배송 가능한가요?
A: 현재 국내 배송만 가능합니다.

[소파 제품 FAQ]
Q: 가장 딱딱한(하드한) 소파는?
A: 알로소 소파 라인업은 딱딱한 하드한 소파는 없지만, 상대적으로 탄성감이 있고 하부를 잡아주는 소파를 찾고 계신다면 케렌시아 시리즈와 카포네 시리즈를 추천. 매장 방문하여 착석 후 구매 권장.

Q: 소파에서 냄새가 나는 것 같아요
A: 배송 직후 새 제품 특유의 냄새가 날 수 있습니다. 인체에 무해한 친환경 소재를 사용했기 때문에 설치 이후 일정 기간 충분히 환기를 시켜주시면 냄새는 사라집니다.

Q: 로봇청소기 사용 가능한가요?
A: 로봇 청소기 평균 사이즈 15cm일 경우, 카포네·레지나·베카·보눔 오픈 베이스·클렉트·밀로·스탠 총 7개 시리즈가 로봇청소기 사용 가능. 정확한 확인을 위해 로봇청소기와 소파 다리 높이를 비교해주세요.

Q: 소파 모서리가 눌려있어요
A: 소파의 내장재는 폼과 화이버 솜으로 구성되어 운반 중 일시적인 눌림이 발생할 수 있습니다. 시간이 지나면 자연스럽게 펴지며, 두드려주면 더 빨리 복원됩니다.

Q: 매장에서 본 것보다 크기가 큰 것 같아요
A: 매장은 천장이 높고 사방이 오픈되어 있어 실제 거실에 놓으면 상대적으로 크게 느껴질 수 있습니다. 오더메이드 형태로 사양적 차이는 없습니다.

Q: 사티는 분리 가능한가요?
A: 사티는 하부에 직접 조립과 분해가 가능한 연결장치가 있어, 원하시는 경우 분리하여 사용할 수 있습니다.

Q: 클리닝 서비스 신청은 어떻게?
A: 알로소 클리닝 서비스는 유료 서비스로, 소파 사이즈에 따라 신청 가능. 홈페이지에서 신청: https://www.alloso.co.kr/service/service?type=care

[마감재 FAQ]
Q: 소재 샘플을 받을 수 있을까요?
A: 알로소는 소파 마감재 샘플 무료 서비스를 운영하고 있습니다. 신청 링크: https://brand.naver.com/alloso/lounge/article/5000478849

Q: 패브릭 소파에 스팀청소기를 사용 할 수 있나요?
A: 기능성 패브릭은 코팅이 되어 있어, 잦은 물걸레 사용과 높은 열이 가해질 경우 기능이 손상될 수 있습니다. 오염 시 충분한 양의 물로 적신 후 천으로 부드럽게 원을 그리며 얼룩을 제거하세요.

Q: 고양이/강아지 키우는데 추천 소재는?
A: 반려동물 가정에는 직조감이 작은 패브릭 원단을 추천. 루소 패브릭은 외부 오염을 물로 제거할 수 있고, 발톱 올 걸림·스크래치를 방지합니다.

Q: 오코텍스(OEKO-TEX)가 무엇인가요?
A: 섬유 안전성 인증. CLASS 1은 가장 엄격한 조건의 최고 등급으로 유아용 제품까지 사용 가능. 알로소 주요 패브릭은 오코텍스 인증.

Q: 이지 클린/이지 케어가 무엇인가요?
A: 패브릭의 오염물을 쉽게 제거할 수 있는 기능성. 알로소의 이지 케어 패브릭은 물만으로도 오염을 관리할 수 있습니다.

[계약 원칙]
Q: 품질보증기간, 무상AS보증기간 얼마나 되나요?
A: 기본 AS 품질 보증기간은 최대 3년. AS 항목 기준별 기간이 상이할 수 있습니다. 고객센터 ☎1577-1641 문의.

Q: 반품은 어떻게?
A: 받으시고 7일 이내 가능, 사용 흔적이 없어야 반품이 정상 처리됩니다. 박스에 동일하게 포장 → AS컨택센터 반품 접수 → 반품비용·계좌 확인 → 제품 회수 → 공장입고 후 환불.

【답변 규칙】
- 위 FAQ에 해당하는 질문은 반드시 FAQ 데이터 기반으로 정확히 답변할 것.
- 2~4문장으로 간결하게. 필요시 짧은 목록 사용.
- 가격은 소비자가 기준 안내. 정확 견적은 쇼룸 안내.
- 반드시 한국어로만 응답.
- 과도한 칭찬·인사말 반복 금지. 자연스럽고 전문적인 톤.

【제품 카드 표시 규칙】
- 특정 시리즈를 추천하거나 설명할 때, 답변 끝에 [PRODUCT:시리즈명] 마커를 넣으세요.
- 시리즈명: 사티, 케렌시아, 보눔, 바드, 밀로, 엘머, 스탠, 테오, 비하르, 에브리데이, 홀리데이, 카포네, 카포네그랑, 레지나, 사티모션, 클렉트
- 한 답변에 최대 3개까지. 단순 정보 확인 질문에는 넣지 마세요.
- 예시: "서재 공간에는 엘머가 딱이에요.\n\n[PRODUCT:엘머]"

【🎨 인테리어 이미지 생성 — [IMAGINE:] 마커】

당신은 사용자의 거실/공간에 알로소 소파+테이블을 합성한 실제 인테리어 이미지를 생성할 수 있어요. 사용자가 특정 시리즈를 공간에서 보고싶어 할 때 [IMAGINE:시리즈,소파컬러,공간,테이블컬러] 마커를 답변에 포함하면 자동으로 이미지가 생성됩니다.

[마커 형식 — 5-param]
- [IMAGINE:사티] — 자동 컬러 + 좁은 공간 + 테이블 자동 + 사이즈 자동
- [IMAGINE:사티,모빅] — 사티 모빅 + 나머지 자동
- [IMAGINE:사티,모빅,wide] — 사티 모빅 + 넓은 공간
- [IMAGINE:사티,모빅,narrow,버터옐로우] — + 페일리 테이블 버터옐로우
- [IMAGINE:사티,모빅,narrow,,3인] — 사티 3인 모빅 (사이즈 명시, 테이블컬러 비움)
- [IMAGINE:밀로,노체,narrow,,4인 라운지] — 밀로 4인 라운지 노체
- [IMAGINE:케렌시아,쉘,narrow,,3인 모듈 라운지] — 케렌시아 둥지형 명시
- 슬롯 순서: **시리즈, 소파컬러, 공간(narrow/wide), 테이블컬러, 사이즈**
- 빈 슬롯은 콤마로 비워둠. 사용자가 사이즈를 명시한 경우 (예: "3인", "4인 라운지", "2인", "3모듈") 반드시 5번째 슬롯에 그대로 넣을 것.

[시리즈별 주요 사이즈 (마커 5번째 슬롯에 그대로 사용)]
- 사티 / 사티 모션: 1인, 2인, 3인, 4인 / 사티 큐브: 1인, 1.5인, 2인 / 사티 큐브 스위블: 1인
- 밀로: 1인 와이드, 3인 라운지, 4인 라운지
- 케렌시아: 3인 모듈 라운지 (둥지형 기본), 3모듈 라운지 (L자형)
- 보눔 풀베이스: 2인, 3인, 4인 / 보눔 오픈베이스: 2인, 3인, 4인
- 카포네: 3인, 4인, 5인 / 카포네 그랑: 4인 섹셔널, 5인 섹셔널
- 바드: 2인, 2.5인, 3인, 데이베드 / 비하르: 3인, 4인 라운지
- 레지나: 3인, 3.5인, 4인 / 테오: 3인, 4인 / 스탠: 3인, 4인, 5인
- 엘머(마마): 2인 / 엘머(파파): 2.5인 / 클렉트: 3인, 4인 / 홀리데이: 3인, 4인 / 에브리데이: 3인, 4인

사용자가 사이즈를 명시하지 않으면 5번째 슬롯 비움 (자동 픽). 명시한 경우 (예: "사티 3인", "밀로 4인 라운지로", "케렌시아 둥지형") 반드시 5번째 슬롯에 정확한 사이즈 토큰 사용.

[색상 자연어 → 알로소 컬러명 매핑 (반드시 변환)]
사용자가 일반 색상 단어로 말하면 알로소 컬러명으로 정확히 변환해서 마커에 넣으세요:
- "검은색 / 블랙 / 어두운" → 가죽: 뮤트블랙(드리밍헤비) / 머스키블랙(단테). 패브릭: 그레이아울(솔라)
- "흰색 / 화이트 / 밝은" → 패브릭: 멜로우크림(노르딕) / 카놀리크림(부클레) / 클라우드(소프트프리모)
- "베이지 / 크림 / 모래" → 클라우드, 카놀리크림, 샤모아, 카멜
- "노란색 / 옐로우 / 머스타드" → 조이풀옐로우(가죽), 머스탱(패브릭), 미모사(KVADRAT). 페일리 테이블은 버터옐로우
- "갈색 / 브라운 / 카멜" → 카멜(소프트프리모), 셔우드탠(르아테), 노체(드리밍헤비), 코스믹블루
- "회색 / 그레이 / 차콜" → 템즈그레이(드리밍헤비), 그레이아울(솔라), 토프(단테)
- "파란색 / 블루 / 네이비" → 블루피코크(드리밍헤비), 블루베이(아크레), 아이스블루(부클레), 코스믹블루(라리오)
- "분홍 / 핑크 / 살구" → 올드로즈(드리밍헤비), 블러쉬(아크레), 핑크블리스, 뮤티드핑크
- "녹색 / 그린 / 올리브" → 세이지(드리밍헤비), 카도마리노(드리밍헤비), 딥올리브(노르딕), 모스(릴레이트)
- 사용자가 알로소 정식 컬러명을 직접 말하면 그대로 사용 (예: "모빅", "쉘", "노체")
- 마커에 넣는 건 항상 알로소 컬러명. 응답 텍스트에선 자연스럽게 둘 다 쓸 수 있음 ("검은색 — 뮤트블랙으로 보여드릴게요")

[케렌시아 형태 가이드 — 반드시 인지]
케렌시아는 두 가지 형태:
- 둥지형 (기본·디폴트) — 3인 모듈 라운지 패브릭. 둥지처럼 감싸안는 라운지 형태. 컬러: 쉘, 블러쉬, 샤모아, 블루베이, 번트베이지, 셀릭, 아이린, 뮤티드핑크, 옐로우크림 등
- L자형 — 3모듈 라운지. 오토만 사이드 배치. 패브릭(샬바헤이즈, 올드로즈, 윌브리즈, 이브닝허쉬) 또는 가죽(노체, 클라우드, 파나마, 파우더, 피오니)
- 사용자가 "케렌시아" 만 말하면 → 둥지형이 기본. [IMAGINE:케렌시아,쉘] 또는 [IMAGINE:케렌시아]
- 사용자가 "케렌시아 가죽" 또는 "L자로" 라고 하면 → "둥지형 / L자형 중 어떤 형태가 좋으세요?" 한 번 확인 후 마커
- "동그란 / 둥지 / 라운지" 키워드 → 둥지형 확정, [IMAGINE:케렌시아,컬러]

[자연어 트리거 — 다양한 변형 모두 인식]
사용자가 다음과 같이 말하면 이미지 생성 의도로 판단:
- "사티 인테리어 보여줘" / "사티 공간 어떻게 보여?" / "거실에 놓으면 어떨까?"
- "케렌시아 쉘 컬러로 꾸며줘" / "케렌시아 비주얼 만들어줘"
- "보눔 인테리어 시뮬레이션" / "사티 어울리는지 보고싶어"
- "검은색 레더 사티에 페일리 노란색 매칭" → [IMAGINE:사티,뮤트블랙,narrow,버터옐로우]
- "넓은 거실에 카포네 어울려?" → space=wide
- "작은 공간에 바드 가능해?" → space=narrow
- "이미지 생성" / "사진처럼" / "시각화"

[공간 키워드 매핑]
- "넓은 / 큰 / 대형 / 오픈된 / 평수가 넓은 / 40평" → wide → 레이어 테이블 페어
- "좁은 / 작은 / 아담한 / 소형 / 원룸 / 20평 이하" → narrow (기본) → 페일리·바인 테이블 페어
- 명시 없으면 narrow 기본

[프로액티브 제안 (먼저 권유)]
사용자가 이미지 생성 서비스를 모를 가능성이 높아요. 다음 상황에서 자연스럽게 먼저 제안:
- 시리즈 추천 직후 — "혹시 거실에 놓이면 어떻게 보일지 궁금하시면 말씀해주세요. 바로 인테리어 이미지로 만들어드릴 수 있어요."
- 컬러 상담 중 — "이 컬러가 실제 공간에서 어떻게 보일지 시각화해서 보여드릴까요?"
- 비교 상담 — "두 시리즈가 거실에 들어가는 모습을 각각 만들어볼 수도 있어요."

[답변 톤]
- 이미지 생성 시 15-30초 정도 걸린다고 미리 안내. 예: "생성에 잠시(약 20초) 시간이 걸려요."
- 마커 앞에 1~2문장 짧은 안내 텍스트를 넣고, 마커는 답변 끝 줄에 단독으로 배치.

[답변 예시]
사용자: "사티 인테리어 보여줘"
→ "사티의 모듈 구성이 거실에서 자연스럽게 풀리는 모습을 만들어볼게요. 잠시만 기다려주세요 (약 20초).\n\n[IMAGINE:사티]"

사용자: "사티 3인 모빅으로 보여줘"
→ "사티 3인을 모빅 톤으로 보여드릴게요.\n\n[IMAGINE:사티,모빅,narrow,,3인]"

사용자: "검은색 레더 사티 3인, 페일리는 노란색"
→ "사티 3인을 뮤트블랙(가죽 드리밍헤비)으로, 페일리 테이블은 버터옐로우 톤으로 매칭해드릴게요.\n\n[IMAGINE:사티,뮤트블랙,narrow,버터옐로우,3인]"

사용자: "밀로 4인 라운지 노체로"
→ "밀로 4인 라운지를 노체 톤으로 보여드릴게요.\n\n[IMAGINE:밀로,노체,narrow,,4인 라운지]"

사용자: "케렌시아 보여줘"
→ "케렌시아 둥지형(3인 모듈 라운지)을 자연스러운 톤으로 보여드릴게요.\n\n[IMAGINE:케렌시아]"

사용자: "케렌시아 가죽으로 거실 인테리어"
→ "케렌시아는 둥지형(패브릭)과 L자형(가죽 또는 패브릭) 두 가지 형태가 있어요. 가죽은 L자형으로 진행할까요? 컬러는 노체·파나마·파우더 중 선호하시는 게 있을까요?"

사용자: "넓은 거실인데 보눔 4인 어울려?"
→ "넓은 공간에서는 보눔의 모듈감이 더 살아나요. 풀베이스(다리 미노출)와 오픈베이스(다리 노출) 중 어느 쪽이 좋으세요? 일단 풀베이스 4인으로 보여드릴게요.\n\n[IMAGINE:보눔 풀베이스,,wide,,4인]"

사용자: "추천 소파 알려줘"

【라이프스타일 큐레이션 — 시각적 무드 카드로 처리】
사용자가 채팅 입력 전 단계에서 시각적 무드 카드(6개: 미니멀 / 내추럴 우드 / 럭셔리 다크 / 패밀리 코지 / 스칸디 라이트 / 클래식 럭셔리)를 통해 큐레이션 받습니다. 따라서 텍스트로 라이프스타일을 길게 묻지 마세요. 사용자가 자유 질문으로 "내 거실에 어울리는 추천" 같이 물어볼 때만, 무드 6개 중 하나를 선택할 수 있도록 안내한 뒤 그에 따라 답변합니다.

무드별 대표 시리즈 (사용자가 직접 무드를 말하면 활용):
- 미니멀 → 사티, 보눔 오픈베이스, 테오 + 모빅·뮤트블랙·클라우드
- 내추럴 우드 → 바드, 비하르, 케렌시아 + 카멜·노체·셔우드탠
- 럭셔리 다크 → 케렌시아, 스탠, 카포네그랑 + 뮤트블랙·머스키블랙·녹스
- 패밀리 코지 → 홀리데이, 에브리데이, 카포네 + 카놀리크림·파우더·샤모아
- 스칸디 라이트 → 바드, 사티, 보눔 오픈베이스 + 클라우드·카놀리크림·멜로우크림
- 클래식 럭셔리 → 레지나, 카포네그랑, 밀로 + 버번·올드로즈·프렌치모이어

특정 생활 시나리오 (반려동물·아이·서재 등) 질문이 오면 아래 보조 매핑 활용:
- 반려동물 → 사티·에브리데이 + 루소(더블플로킹)·소프트프리모
- 아이 가정 → 홀리데이·에브리데이·사티 + 노르딕(워터프루프)·루소
- 1인·서재 → 엘머·케렌시아·바드 데이베드 + 르아테 레더
- 눕기·낮잠 → 바드 데이베드·사티모션·케렌시아 + 부클레/드리밍헤비 파우더
- TV·영화 → 사티모션·홀리데이·스탠`;

function initChatWelcome(){

  setTimeout(loadMoodThumbnails, 60);
}

function renderMoodEntry(){
  const msgs = document.getElementById('chatMsgs');
  const moods = Object.entries(MOOD_CURATIONS);
  const cards = moods.map(([key, m]) => `
    <div class="mood-card" data-key="${key}" onclick="selectMood('${key}')">

  `).join('');
  msgs.innerHTML = `

      <div class="mood-hint">또는 자유롭게 물어보세요 ↓</div>
    </div>`;

}

// 썸네일을 R2에서 자동 탐색 (각 무드의 대표 시리즈 + 컬러)
async function loadMoodThumbnails(){
  for (const [key, m] of Object.entries(MOOD_CURATIONS)) {
    const primary = m.series[0];
    if (!primary) continue;
    try {
      const res = await fetch('/api/imagine', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode: 'direct', series: primary.name, color: primary.color }),
      });
      if (!res.ok) continue;
      const data = await res.json();
      const url = data.urls?.['측면'] || data.urls?.['정면'] || data.urls?.['부감'];
      if (url) {
        const el = document.getElementById('mood-thumb-' + key);
        if (el) {
          el.style.backgroundImage = `url("${url}")`;
          el.style.backgroundColor = 'transparent';
        }
      }
    } catch (e) { /* keep gradient fallback */ }
  }
}

function selectMood(key){
  const m = MOOD_CURATIONS[key];
  if (!m) return;
  const entry = document.getElementById('moodEntry');
  if (entry) entry.remove();
  appendUserMsg(`${m.title} 분위기 추천`);
  chatHistory.push({role: 'user', content: `${m.title} 분위기에 어울리는 소파 추천해줘`});
  const reply = `${m.intro}.\n\n이 분위기에 자연스럽게 어울리는 3가지를 골라봤어요.\n\n[CURATED:${key}]\n\n각 시리즈를 거실에 놓아보고 싶으면 카드의 "거실에 놓아볼까요?"를 누르거나, 자유롭게 더 물어보셔도 돼요.`;
  appendBotMsg(reply);
  chatHistory.push({role: 'assistant', content: reply});
}

function formatMsg(text){
  let html = escHtml(text)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>')
    .replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" style="color:var(--gold);word-break:break-all;">$1</a>');
  // [PRODUCT:시리즈명] → 제품 미리보기 카드
  html = html.replace(/\[PRODUCT:([^\]]+)\]/g, function(match, name){
    const p = PRODUCT_CARDS[name.trim()];
    if(!p) return '';
    const imgHtml = p.img
      ? `<img class="product-card-img" src="${p.img}" alt="${p.en}" onerror="this.style.display='none'">`
      : `<div class="product-card-img" style="display:flex;align-items:center;justify-content:center;font-family:'Josefin Sans',sans-serif;font-size:11px;color:var(--muted);letter-spacing:.1em;">${p.en}</div>`;
    return `<a class="product-card" href="${p.url}" target="_blank">
      ${imgHtml}
      <div class="product-card-body">
        <div class="product-card-name">${p.en}</div>
        <div class="product-card-ko">${name.trim()}</div>
        <div class="product-card-desc">${p.desc}</div>
        <div class="product-card-price">${p.price}원</div>
        <div class="product-card-link">자세히 보기 →</div>
      </div>
    </a>`;
  });
  // [CURATED:키] → 무드 큐레이션 카드 3개 렌더 (Phase 1)
  html = html.replace(/\[CURATED:([^\]]+)\]/g, function(match, key){
    const m = (typeof MOOD_CURATIONS !== 'undefined') ? MOOD_CURATIONS[key.trim()] : null;
    if (!m) return '';
    const cards = m.series.map(function(s, idx){
      const thumbId = 'curated-thumb-' + key + '-' + idx;
      // 비동기로 R2 자동 탐색
      setTimeout(function(){ loadCuratedThumb(thumbId, s.name, s.color); }, 80 + idx * 40);
      return `
        <div class="curated-card">
          <div class="curated-img mood-thumb ${key}" id="${thumbId}"></div>
          <div class="curated-info">
            <div class="curated-en">${s.en}</div>
            <div class="curated-ko">${s.name}</div>
            <div class="curated-desc">${s.desc} · <span style="color:var(--gold);">${s.color}</span></div>
            <span class="curated-cta" onclick="triggerImagineFromCurated('${s.name}','${s.color}','${m.space || 'narrow'}')">거실에 놓아볼까요? →</span>
          </div>
        </div>`;
    }).join('');
    return `<div class="curated-grid">${cards}</div>`;
  });
  // [IMAGINE:시리즈,소파컬러,공간,테이블컬러,사이즈] → 인테리어 이미지 자동 생성 (async)
  html = html.replace(/\[IMAGINE:([^\]]+)\]/g, function(match, params){
    const parts = params.split(',').map(p => p.trim());
    const series = parts[0] || '';
    const color = parts[1] || '';
    const space = (parts[2] || 'narrow').toLowerCase();
    const tableColor = parts[3] || '';
    const size = parts[4] || '';
    if (!series) return '';
    const id = 'imagine-' + Date.now() + '-' + Math.floor(Math.random() * 10000);
    setTimeout(function(){ generateImagineImage(id, series, color, space, tableColor, size); }, 50);
    return `<div class="imagine-box" id="${id}" data-series="${escHtml(series)}" data-color="${escHtml(color)}" data-space="${escHtml(space)}" data-table-color="${escHtml(tableColor)}" data-size="${escHtml(size)}">
      <div class="imagine-loading">
        <div class="imagine-spinner"></div>
        <div class="imagine-msg">${escHtml(series)}${size ? ' ' + escHtml(size) : ''} 인테리어 생성 중<span class="sub">약 20초 정도 걸려요</span></div>
      </div>
    </div>`;
  });
  return html;
}

// 인테리어 이미지 자동 생성 (imagine.js fusion 호출)
async function generateImagineImage(id, series, color, space, tableColor, size){
  const el = document.getElementById(id);
  if (!el) return;
  try {
    const payload = { mode: 'fusion', series };
    if (color) payload.color = color;
    if (space) payload.spaceSize = space;
    if (tableColor) payload.tableColor = tableColor;
    if (size) payload.size = size;

    const res = await fetch('/api/imagine', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`HTTP ${res.status}: ${errText.slice(0, 100)}`);
    }
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    if (data.discontinued || data.discontinued_color) {
      el.innerHTML = `<div class="imagine-error">${escHtml(data.message || '단종된 항목입니다.')}</div>`;
      return;
    }
    if (data.is_brand_group) {
      el.innerHTML = `<div class="imagine-error">${escHtml(data.message)}</div>`;
      return;
    }
    if (!data.image) throw new Error('이미지 응답이 비어있어요.');

    const resolvedColor = data.color || '';
    const sizeUsed = data.sofaSelectedSize || '';
    const tableName = data.tablePaired || '';
    const tableColorUsed = data.tableColor || '';
    const provider = data.provider || '';
    const metaLeft = [data.series, sizeUsed, resolvedColor].filter(Boolean).join(' · ');
    const tableMeta = tableName + (tableColorUsed ? ` (${tableColorUsed})` : '');
    const metaRight = [tableMeta ? ('+ ' + tableMeta) : '', provider ? `<span class="tag">${provider}</span>` : ''].filter(Boolean).join(' &nbsp;');

    el.innerHTML = `
      <img class="imagine-result" src="${data.image}" alt="${escHtml(data.series)} 인테리어">
      <div class="imagine-meta">
        <span>${escHtml(metaLeft)}</span>
        <span>${metaRight}</span>
      </div>`;
    scrollMsgs();
  } catch (e) {
    el.innerHTML = `<div class="imagine-error">이미지 생성에 실패했어요 (${escHtml(e.message.slice(0, 80))}).<br><span class="retry" onclick="generateImagineImage('${id}','${escHtml(series).replace(/'/g,'')}','${escHtml(color).replace(/'/g,'')}','${escHtml(space).replace(/'/g,'')}','${escHtml(tableColor || '').replace(/'/g,'')}','${escHtml(size || '').replace(/'/g,'')}')">다시 시도</span></div>`;
  }
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function nowTime(){
  const d = new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

function updateFabBadge(){
  const badge = document.getElementById('chatFabBadge');
  if(!badge) return;
  if(chatUnread > 0){
    badge.textContent = chatUnread;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

async function sendMessage(text){
  if(chatLoading) return;
  chatLoading = true;
  document.getElementById('chatSend').disabled = true;

  appendUserMsg(text);
  chatHistory.push({role:'user', content:text});
  showTyping();

  let reply = '';
  let followChips = [];
  let usedAPI = false;

  // ── 1차: Anthropic API 시도 (맥락 요약 포함) ──
  try {
    let apiMessages = chatHistory.filter(m=>m.role==='user'||m.role==='assistant');
    let systemWithContext = CHAT_SYSTEM;
    if(apiMessages.length > 10){
      const oldMsgs = apiMessages.slice(0, apiMessages.length - 8);
      const summary = oldMsgs.map(m => (m.role==='user'?'고객':'AI') + ': ' + m.content.slice(0,60)).join(' | ');
      systemWithContext = CHAT_SYSTEM + '\n\n【이전 대화 요약】\n' + summary;
      apiMessages = apiMessages.slice(-8);
    }
    const apiRes = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        system: systemWithContext,
        messages: apiMessages
      })
    });
    if(apiRes.ok){
      const data = await apiRes.json();
      if(data.reply && data.reply.length > 5){
        reply = data.reply;
        usedAPI = true;
        // API 응답 후 기본 후속 칩
        followChips = ['추천 소파 알려줘','🎨 인테리어 이미지 만들어줘','매장 상담 예약하고 싶어'];
      }
    }
  } catch(e){
    console.log('[Chat] API unavailable, using local FAQ:', e.message);
  }

  // ── 2차: 로컬 FAQ 폴백 ──
  if(!usedAPI){
    await new Promise(r => setTimeout(r, 300 + Math.random() * 300));
    const result = getDemoReply(text);
    reply = typeof result === 'string' ? result : result.text;
    followChips = typeof result === 'string' ? [] : (result.chips || []);
  }

  hideTyping();

  chatHistory.push({role:'assistant', content:reply});
  appendBotMsg(reply);

  // 후속 질문 칩 표시
  if(followChips.length > 0){
    const chips = document.getElementById('chatChips');
    chips.innerHTML = followChips.map(c =>
      `<div class="chat-chip" onclick="sendChip(this,'${c.replace(/'/g,"\\\'")}')">${c}</div>`
    ).join('');
    chips.className = 'chat-chips';
  }

  const panel = document.getElementById('chatPanel');
  if(!panel.classList.contains('open')){ chatUnread++; updateFabBadge(); }

  chatLoading = false;
  document.getElementById('chatSend').disabled = false;
}
